services:
  minio1:
    image: minio/minio:latest
    hostname: minio1
    command: server http://minio{1...3}/data{1...2} --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio1-data1:/data1
      - minio1-data2:/data2

  minio2:
    image: minio/minio:latest
    hostname: minio2
    command: server http://minio{1...3}/data{1...2} --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password123
    volumes:
      - minio2-data1:/data1
      - minio2-data2:/data2

  minio3:
    image: minio/minio:latest
    hostname: minio3
    command: server http://minio{1...3}/data{1...2} --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password123
    volumes:
      - minio3-data1:/data1
      - minio3-data2:/data2

volumes:
  minio1-data1:
  minio1-data2:
  minio2-data1:
  minio2-data2:
  minio3-data1:
  minio3-data2: